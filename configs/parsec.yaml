# parsec Configuration - Minimal Example
#
# This is a minimal working configuration using stub implementations
# for testing and development. For production use, see parsec-production.yaml

server:
  grpc_port: 9090
  http_port: 8080

# Observability configuration
observability:
  type: composite
  log_level: info
  log_format: json
  observers:
    - type: logging
    - type: metrics

# Trust domain for this parsec instance
# Used as the audience (aud) claim in all issued tokens
trust_domain: "parsec.example.com"

# Exchange server configuration
exchange_server:
  # Claims filter (determines which request_context claims actors can provide)
  claims_filter:
    type: stub  # Allow all claims (passthrough)

# Trust store configuration
trust_store:
  type: stub_store
  validators:
    - name: redhat-sso
      type: jwt_validator
      issuer: "https://sso.redhat.com/auth/realms/redhat-external"
      jwks_url: "https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/certs"
      trust_domain: "https://sso.redhat.com/auth/realms/redhat-external"
      refresh_interval: "15m"
      audiences: ["rhsm-api", "customer-portal", "api.console", ""]

# Data sources for token enrichment
data_sources:
  - name: identity-policy
    type: static
    data:
      internal_idp_target: "https://sso.redhat.com/auth/realms/internal"
      role_fallback_enabled: true

# Token issuers
issuers:
  # Transaction token issuer (stub for testing)
  - token_type: "urn:ietf:params:oauth:token-type:txn_token"
    type: stub
    issuer_url: "https://parsec.example.com"
    ttl: 5m
    # Transaction context mappers build the "tctx" claim
    transaction_context:
      - type: cel
        name: redhat-identity-mapper
        script_file: ./configs/scripts/redhat_identity.cel
    # Request context mappers build the "req_ctx" claim
    request_context:
      - type: request_attributes  # Include request path, method, etc.

  # Red Hat identity token issuer
  - token_type: "urn:redhat:params:oauth:token-type:rh-identity"
    type: unsigned
    # Claim mappers build the full x-rh-identity envelope (identity + entitlements)
    claim_mappers:
      - type: cel
        name: redhat-identity-mapper
        script_file: ./configs/scripts/redhat_identity.cel

# Credential sources define how incoming credentials are extracted from
# requests. Sources are tried in order; the first match wins.
#
# This list is shared by all three extraction paths:
#   - ext_authz subject (Envoy HTTP headers)
#   - ext_authz actor   (gRPC metadata)
#   - exchange caller   (gRPC metadata)
#
# Sources return no match when the expected header is absent, so including
# all source types here is safe. When no credential_sources are configured,
# parsec defaults to bearer-only (Authorization: Bearer).
credential_sources:
  - name: authorization-bearer
    type: authorization_bearer_opaque
  - name: cs-jwt-cookie
    type: cookie_bearer_opaque
    cookie_name: cs_jwt

# Authorization server configuration (ext_authz)
authz_server:
  policy:
    type: static_authenticated
    token_types:
      - type: "urn:ietf:params:oauth:token-type:txn_token"
        header_name: "Transaction-Token"
      - type: "urn:redhat:params:oauth:token-type:rh-identity"
        header_name: "x-rh-identity"
